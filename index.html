<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Web Push Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f2f2f7;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      text-align: center;
    }
    button {
      margin-top: 14px;
      font-size: 16px;
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      background: #007aff;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Web Push Demo</h2>
  <p>20 push • start in 5 sec</p>
  <button onclick="startPushes()">Запустити push</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}

function randomAmount() {
  return (Math.random() * 150 + 10).toFixed(2);
}

async function startPushes() {

  const permission = await Notification.requestPermission();
  if (permission !== 'granted') return;

  const reg = await navigator.serviceWorker.ready;

  const totalPushes = 20;

  setTimeout(() => {

    for (let i = 0; i < totalPushes; i++) {

      setTimeout(() => {

        const amount = randomAmount();

        reg.showNotification("Playful Rewards", {
          body: `You earned $${amount} CAD for playing games`,
          icon: "icon.png"
        });

      }, i * 1000);

    }

  }, 5000);

}
</script>

</body>
</html>
